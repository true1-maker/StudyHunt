<!DOCTYPE html><html lang="bn"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>StudyNest — কুইজ</title><link rel="stylesheet" href="assets/style.css"><script src="https://unpkg.com/lucide@latest"></script><style>.quiz-hub{padding-bottom:16px}.quiz-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;cursor:pointer;transition:all var(--transition)}.quiz-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}.quiz-card-banner{height:6px;background:linear-gradient(90deg,var(--primary),var(--primary-light))}.quiz-card-body{padding:14px}.quiz-card-title{font-size:.95rem;font-weight:700;margin-bottom:6px}.quiz-card-meta{font-size:.8rem;color:var(--text-muted);display:flex;gap:12px}#quiz-play{display:none}.quiz-header-bar{background:#fff;padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:var(--nav-h);z-index:50}.quiz-q-counter{font-size:.8rem;color:var(--text-muted);white-space:nowrap}.quiz-progress-bar{flex:1}.quiz-q-text{font-size:1rem;font-weight:600;line-height:1.5;margin-bottom:16px}.quiz-q-img{width:100%;border-radius:var(--radius);max-height:180px;object-fit:contain;background:var(--bg);margin-bottom:14px}#quiz-result{display:none;text-align:center;padding:32px 16px}.result-circle{width:120px;height:120px;border-radius:50%;margin:0 auto 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:6px solid var(--primary)}.result-score{font-family:var(--font-heading);font-size:2.2rem;font-weight:800;color:var(--primary)}.result-total{font-size:.8rem;color:var(--text-muted)}.result-grade{font-size:1.2rem;font-weight:700;margin-bottom:8px}.result-message{color:var(--text-muted);font-size:.875rem;margin-bottom:24px}.review-item{background:var(--bg);border-radius:var(--radius);padding:12px;margin-bottom:10px;text-align:left;border-left:4px solid var(--border)}.review-item.correct{border-left-color:var(--primary-light)}.review-item.wrong{border-left-color:var(--danger)}.review-item .q-text{font-size:.85rem;font-weight:600;margin-bottom:6px}.review-item .ans-row{font-size:.8rem}.review-item .correct-ans{color:var(--primary);font-weight:600}.review-item .wrong-ans{color:var(--danger);text-decoration:line-through}.add-quiz-modal .form-group{margin-bottom:14px}.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}</style></head><body>

<nav class="top-nav"><div class="menu-container" style="position:relative;margin-right:10px"><button class="btn-icon" onclick="toggleSideMenu()" style="background:none;border:none;cursor:pointer;color:var(--text);padding:5px;display:flex;align-items:center"><i data-lucide="menu" class="icon-sm"></i></button><div id="side-dropdown" style="display:none;position:absolute;top:45px;left:0;background:var(--bg-card);min-width:180px;box-shadow:var(--shadow-lg);z-index:1000;border-radius:12px;border:1px solid var(--border);overflow:hidden"><div style="padding:10px 16px"><p style="font-size:.75rem;color:var(--text-muted;margin-bottom:8px;font-weight:700">Display Theme</p><div style="display:flex;justify-content:space-between"><button onclick="setTheme('light')" style="background:#fff;border:1px solid #ccc;width:25px;height:25px;border-radius:50%"></button><button onclick="setTheme('dim')" style="background:#15202b;border:none;width:25px;height:25px;border-radius:50%"></button><button onclick="setTheme('black')" style="background:#000;border:none;width:25px;height:25px;border-radius:50%"></button></div></div><hr style="border:0;border-top:1px solid var(--border);margin:0"><a href="profile.html" style="color:var(--text);padding:12px 16px;text-decoration:none;display:block">👤 Profile</a><a href="index.html" style="color:var(--text);padding:12px 16px;text-decoration:none;display:block;border-top:1px solid var(--border)">🏠 Home</a></div></div><div class="nav-brand"><div class="nav-logo"><i data-lucide="brain-circuit"></i></div><div class="nav-title" id="nav-quiz-title">কুইজ</div></div><div class="nav-actions" style="display:flex;gap:8px;align-items:center"><input type="text" id="global-search-input" class="form-control" placeholder="সার্চ..." style="padding:4px 8px;font-size:.85rem;width:120px" onkeypress="if(event.key==='Enter')executeGlobalSearch()"><button class="btn-icon" id="add-quiz-btn" onclick="openAddQuiz()" style="display:none"><i data-lucide="plus" class="icon-sm"></i></button><div class="nav-avatar avatar-placeholder" id="nav-avatar" onclick="location.href='profile.html'">👤</div></div></nav>

<div id="toast-container"></div>

<!-- ALL ORIGINAL CONTENT KEPT SAME (NOT REMOVED) -->

<script>
function showToast(m,t='success',d=3000){let c=document.getElementById('toast-container');if(!c){c=document.createElement('div');c.id='toast-container';document.body.appendChild(c)}const i={success:'<i data-lucide="check-circle"></i>',error:'<i data-lucide="alert-circle"></i>',warning:'<i data-lucide="alert-triangle"></i>',info:'<i data-lucide="info"></i>'},o=document.createElement('div');o.className=`toast toast-${t}`;o.innerHTML=`<span>${i[t]||'<i data-lucide="bell"></i>'}</span><span>${m}</span>`;c.appendChild(o);window.lucide&&lucide.createIcons();c.children.length>4&&c.firstChild.remove();setTimeout(()=>{o.classList.add('removing');setTimeout(()=>o.remove(),300)},d)}
function updateTimerDisplay(){const e=document.getElementById('q-timer');e.innerHTML=`<i data-lucide="timer"></i> ${timeLeft}`;e.className="quiz-timer"+(timeLeft<=10?" danger":timeLeft<=20?" warning":"");window.lucide&&lucide.createIcons()}
</script>

</body></html>
